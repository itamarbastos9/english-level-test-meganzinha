<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Level Test with Meganzinha</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 30px auto 0;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h1 {
      color: #333;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #58cc02;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .option {
      display: block;
      width: 100%;
      background: #eee;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      font-size: 16px;
      text-align: left;
      color: #222;
    }

    .option.selected {
      background: #58cc02;
      color: white;
    }

    .status {
      margin-top: 15px;
      font-weight: bold;
    }

    .ok {
      color: green;
    }

    .error {
      color: red;
    }

    .review-card {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 18px;
      text-align: left;
    }

    .correct {
      color: green;
      font-weight: bold;
    }

    .wrong {
      color: red;
      font-weight: bold;
    }

    #quiz-screen,
    #final-screen {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>English Level Test with Meganzinha</h1>

    <p id="js-status" class="status error">JavaScript not loaded yet</p>

    <div id="start-screen">
      <input id="student-name" type="text" placeholder="Your name">
      <input id="student-email" type="email" placeholder="Your email">
      <button id="start-btn" type="button">Start Test</button>
    </div>

    <div id="quiz-screen">
      <h3 id="question-counter"></h3>
      <h2 id="question"></h2>
      <div id="options"></div>
      <button id="next-btn" type="button" disabled>Next</button>
    </div>

    <div id="final-screen">
      <h2>Finished</h2>
      <p id="final-score"></p>
      <button id="restart-btn" type="button">Restart</button>
    </div>
  </div>

  <script>
    document.getElementById("js-status").textContent = "JavaScript loaded";
    document.getElementById("js-status").className = "status ok";

    var questions = [
      {
        question: "She __ to school every day.",
        options: ["go", "goes", "going", "gone"],
        answer: "goes"
      },
      {
        question: "I __ coffee yesterday.",
        options: ["drink", "drank", "drunk", "drinking"],
        answer: "drank"
      }
    ];

    var current = 0;
    var score = 0;
    var selectedAnswer = "";

    var startScreen = document.getElementById("start-screen");
    var quizScreen = document.getElementById("quiz-screen");
    var finalScreen = document.getElementById("final-screen");

    var nameInput = document.getElementById("student-name");
    var emailInput = document.getElementById("student-email");
    var startBtn = document.getElementById("start-btn");
    var nextBtn = document.getElementById("next-btn");
    var restartBtn = document.getElementById("restart-btn");

    var questionCounter = document.getElementById("question-counter");
    var questionEl = document.getElementById("question");
    var optionsEl = document.getElementById("options");
    var finalScore = document.getElementById("final-score");

    function showQuestion() {
      selectedAnswer = "";
      nextBtn.disabled = true;

      var q = questions[current];
      questionCounter.textContent = "Question " + (current + 1) + " of " + questions.length;
      questionEl.textContent = q.question;
      optionsEl.innerHTML = "";

      q.options.forEach(function(option) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "option";
        btn.textContent = option;

        btn.onclick = function() {
          var all = document.querySelectorAll(".option");
          all.forEach(function(item) {
            item.classList.remove("selected");
          });

          btn.classList.add("selected");
          selectedAnswer = option;
          nextBtn.disabled = false;
        };

        optionsEl.appendChild(btn);
      });
    }

    function startQuiz() {
      var name = nameInput.value.trim();
      var email = emailInput.value.trim();

      if (!name || !email) {
        alert("Enter name and email");
        return;
      }

      startScreen.style.display = "none";
      finalScreen.style.display = "none";
      quizScreen.style.display = "block";

      current = 0;
      score = 0;
      showQuestion();
    }

    function nextQuestion() {
      if (!selectedAnswer) {
        alert("Select an answer");
        return;
      }

      if (selectedAnswer === questions[current].answer) {
        score++;
      }

      current++;

      if (current < questions.length) {
        showQuestion();
      } else {
        quizScreen.style.display = "none";
        finalScreen.style.display = "block";
        finalScore.textContent = "Score: " + score + " / " + questions.length;
      }
    }

    startBtn.onclick = startQuiz;
    nextBtn.onclick = nextQuestion;
    restartBtn.onclick = function() {
      location.reload();
    };
  </script>
</body>
</html>
