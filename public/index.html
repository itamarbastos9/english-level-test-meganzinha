<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Level Test with Meganzinha</title>

<style>

body{
font-family:Arial;
background:linear-gradient(180deg,#f8fbff,#eef4ff);
margin:0;
padding:30px;
color:#1f2937;
}

.container{
max-width:850px;
margin:auto;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

h1{
margin:0;
font-size:38px;
}

.subtitle{
color:#6b7280;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:1px solid #dbe3ee;
font-size:16px;
background:#f9fbff;
}

input:focus{
border-color:#58cc02;
outline:none;
}

button{
padding:14px 20px;
border:none;
border-radius:12px;
background:#58cc02;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 10px 20px rgba(88,204,2,0.2);
}

button:disabled{
background:#cbd5e1;
cursor:not-allowed;
box-shadow:none;
transform:none;
}

#quiz-screen,
#final-screen{
display:none;
}

#question{
font-size:28px;
margin-bottom:20px;
}

.option{
display:block;
width:100%;
background:#f8fbff;
padding:16px;
margin:10px 0;
border-radius:14px;
border:1px solid #dbe7f3;
font-size:17px;
cursor:pointer;
text-align:left;
}

.option:hover{
background:#eef7ff;
}

.option.selected{
background:#ecfdf3;
border:2px solid #58cc02;
color:#14532d;
}

.progress-container{
width:100%;
height:12px;
background:#e5edf6;
border-radius:999px;
overflow:hidden;
margin-top:20px;
}

#progress-bar{
height:12px;
background:#58cc02;
width:0%;
}

.review-card{
border:1px solid #e5e7eb;
border-radius:16px;
padding:20px;
margin-top:15px;
}

.correct{
color:green;
font-weight:bold;
}

.wrong{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>English Level Test with Meganzinha</h1>
<p class="subtitle">Answer the questions and discover your English level</p>

<div id="start-screen">

<input id="student-name" placeholder="Your name">
<input id="student-email" placeholder="Your email">

<button onclick="startQuiz()">Start Test</button>

</div>

<div id="quiz-screen">

<h3 id="question-counter"></h3>

<h2 id="question"></h2>

<div id="options"></div>

<button id="next-btn" onclick="nextQuestion()" disabled>Next</button>

<div class="progress-container">
<div id="progress-bar"></div>
</div>

</div>

<div id="final-screen">

<h2>Finished</h2>

<h3 id="final-score"></h3>

<h3 id="final-level"></h3>

<h2>Review</h2>

<div id="review-list"></div>

<button onclick="location.reload()">Restart</button>

</div>

</div>

<script>

var questions=[

{question:"She __ to school every day.",options:["go","goes","going","gone"],answer:"goes"},
{question:"I __ coffee yesterday.",options:["drink","drank","drunk","drinking"],answer:"drank"},
{question:"They __ watching TV now.",options:["is","are","am","be"],answer:"are"},
{question:"He __ finished his homework.",options:["have","has","had","having"],answer:"has"},
{question:"We __ to the park tomorrow.",options:["go","went","will go","gone"],answer:"will go"},
{question:"If I __ more time, I would study more.",options:["have","had","will have","am having"],answer:"had"},
{question:"She has lived here __ 2019.",options:["for","since","from","at"],answer:"since"},
{question:"This is the book __ I told you about.",options:["who","where","which","what"],answer:"which"},
{question:"He is __ than his brother.",options:["tall","taller","more tall","most tall"],answer:"taller"},
{question:"They were tired, __ they kept working.",options:["but","so","because","or"],answer:"but"},
{question:"She __ English for five years.",options:["studies","studied","has studied","study"],answer:"has studied"},
{question:"I didn't see __ at the party.",options:["nobody","anybody","somebody","everybody"],answer:"anybody"},
{question:"This movie is __ interesting.",options:["very","much","many","more"],answer:"very"},
{question:"He asked me __ I was from.",options:["where","what","who","how"],answer:"where"},
{question:"If it rains, we __ at home.",options:["stay","will stay","stayed","staying"],answer:"will stay"}

]

var current=0
var score=0
var selectedAnswer=""
var answersReview=[]

function calculateLevel(score){

if(score<=5) return "A1 Beginner"
if(score<=8) return "A2 Elementary"
if(score<=11) return "B1 Intermediate"
if(score<=13) return "B2 Upper Intermediate"
return "C1 Advanced"

}

function startQuiz(){

var name=document.getElementById("student-name").value
var email=document.getElementById("student-email").value

if(!name || !email){
alert("Enter name and email")
return
}

document.getElementById("start-screen").style.display="none"
document.getElementById("quiz-screen").style.display="block"

showQuestion()

}

function showQuestion(){

selectedAnswer=""
document.getElementById("next-btn").disabled=true

var q=questions[current]

document.getElementById("question-counter").innerText="Question "+(current+1)+" of "+questions.length

document.getElementById("question").innerText=q.question

var optionsDiv=document.getElementById("options")

optionsDiv.innerHTML=""

q.options.forEach(function(option){

var btn=document.createElement("button")

btn.className="option"

btn.innerText=option

btn.onclick=function(){

document.querySelectorAll(".option").forEach(function(o){
o.classList.remove("selected")
})

btn.classList.add("selected")

selectedAnswer=option

document.getElementById("next-btn").disabled=false

}

optionsDiv.appendChild(btn)

})

document.getElementById("progress-bar").style.width=(current/questions.length*100)+"%"

}

function nextQuestion(){

if(!selectedAnswer){
alert("Select an answer")
return
}

var q=questions[current]

var correct=(selectedAnswer===q.answer)

if(correct) score++

answersReview.push({
question:q.question,
selected:selectedAnswer,
correct:q.answer,
isCorrect:correct
})

current++

if(current<questions.length){
showQuestion()
}else{
finishTest()
}

}

function finishTest(){

document.getElementById("quiz-screen").style.display="none"
document.getElementById("final-screen").style.display="block"

document.getElementById("final-score").innerText="Score: "+score+" / "+questions.length

document.getElementById("final-level").innerText="Your level: "+calculateLevel(score)

var review=document.getElementById("review-list")

answersReview.forEach(function(item){

var card=document.createElement("div")

card.className="review-card"

card.innerHTML=
"<p>"+item.question+"</p>"+
"<p class='"+(item.isCorrect?"correct":"wrong")+"'>Your answer: "+item.selected+"</p>"+
"<p class='correct'>Correct answer: "+item.correct+"</p>"

review.appendChild(card)

})

}

</script>

</body>
</html>
