<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Level Test with Meganzinha</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f6f9ff 0%, #eef4ff 100%);
      color: #1f2937;
    }

    .container {
      max-width: 920px;
      margin: 24px auto;
      background: #ffffff;
      border-radius: 28px;
      padding: 36px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.10);
      border: 1px solid #e8eef8;
    }

    .top-badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eefbf0;
      color: #2f7d32;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1.08;
      color: #111827;
    }

    .subtitle {
      margin-top: 12px;
      margin-bottom: 28px;
      color: #6b7280;
      font-size: 17px;
      line-height: 1.5;
    }

    .card {
      background: #fbfdff;
      border: 1px solid #e7eef7;
      border-radius: 22px;
      padding: 24px;
    }

    input {
      width: 100%;
      padding: 15px 16px;
      margin: 10px 0;
      border-radius: 14px;
      border: 1px solid #dbe3ee;
      background: #ffffff;
      font-size: 16px;
      color: #111827;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: #58cc02;
      box-shadow: 0 0 0 4px rgba(88, 204, 2, 0.12);
    }

    .primary-btn {
      border: none;
      border-radius: 14px;
      background: #58cc02;
      color: white;
      padding: 14px 22px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(88, 204, 2, 0.22);
    }

    .primary-btn:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    #quiz-screen,
    #final-screen {
      display: none;
    }

    .quiz-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .question-counter {
      font-size: 15px;
      font-weight: 700;
      color: #475569;
    }

    .percent-badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: #eff6ff;
      color: #2563eb;
      font-size: 13px;
      font-weight: 700;
    }

    .progress-wrap {
      margin-bottom: 22px;
    }

    .progress-container {
      width: 100%;
      height: 12px;
      background: #e7edf6;
      border-radius: 999px;
      overflow: hidden;
    }

    #progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #58cc02 0%, #7ee22e 100%);
      transition: width 0.25s ease;
    }

    #question {
      margin: 0 0 24px;
      font-size: 36px;
      line-height: 1.25;
      color: #0f172a;
    }

    #options {
      display: grid;
      gap: 14px;
    }

    .option {
      width: 100%;
      border: 2px solid #dbe7f3;
      background: #ffffff;
      border-radius: 18px;
      padding: 0;
      cursor: pointer;
      text-align: left;
      transition: 0.18s ease;
      overflow: hidden;
    }

    .option:hover {
      border-color: #93c5fd;
      background: #f8fbff;
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.05);
    }

    .option.selected {
      border-color: #58cc02;
      background: #f3fff0;
      box-shadow: 0 12px 24px rgba(88, 204, 2, 0.12);
    }

    .option-inner {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px;
    }

    .option-letter {
      width: 42px;
      height: 42px;
      min-width: 42px;
      border-radius: 12px;
      background: #eef4ff;
      color: #1d4ed8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
    }

    .option.selected .option-letter {
      background: #58cc02;
      color: #ffffff;
    }

    .option-text {
      color: #111827;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.4;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 22px;
    }

    .result-box {
      background: linear-gradient(180deg, #f6fff2 0%, #effde8 100%);
      border: 1px solid #d8f2c1;
      border-radius: 22px;
      padding: 24px;
      margin-bottom: 26px;
    }

    .result-box h2 {
      margin: 0 0 10px;
      font-size: 34px;
      color: #166534;
    }

    .result-score {
      font-size: 24px;
      font-weight: 800;
      color: #111827;
      margin: 8px 0;
    }

    .level-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #dcfce7;
      color: #166534;
      font-weight: 800;
      font-size: 15px;
    }

    .review-title {
      font-size: 28px;
      margin: 0 0 14px;
      color: #0f172a;
    }

    .review-card {
      border: 1px solid #e5e7eb;
      background: #ffffff;
      border-radius: 20px;
      padding: 22px;
      margin-top: 16px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
    }

    .review-card h4 {
      margin: 0 0 10px;
      font-size: 20px;
      color: #0f172a;
    }

    .review-question {
      margin: 0 0 14px;
      color: #334155;
      font-size: 16px;
      line-height: 1.5;
    }

    .review-line {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 15px;
    }

    .correct {
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .wrong {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .correct-answer {
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }

    @media (max-width: 700px) {
      body {
        padding: 14px;
      }

      .container {
        padding: 22px;
        border-radius: 20px;
      }

      h1 {
        font-size: 34px;
      }

      #question {
        font-size: 28px;
      }

      .option-text {
        font-size: 16px;
      }

      .actions {
        justify-content: stretch;
      }

      .primary-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="top-badge">Premium Placement Test</div>
    <h1>English Level Test with Meganzinha</h1>
    <p class="subtitle">Answer the questions and discover your English level with a more professional placement-test experience.</p>

    <div id="start-screen" class="card">
      <input id="student-name" placeholder="Your name">
      <input id="student-email" placeholder="Your email">
      <button class="primary-btn" onclick="startQuiz()">Start Test</button>
    </div>

    <div id="quiz-screen" class="card">
      <div class="quiz-top">
        <div id="question-counter" class="question-counter"></div>
        <div id="percent-badge" class="percent-badge">0%</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-container">
          <div id="progress-bar"></div>
        </div>
      </div>

      <h2 id="question"></h2>
      <div id="options"></div>

      <div class="actions">
        <button id="next-btn" class="primary-btn" onclick="nextQuestion()" disabled>Next</button>
      </div>
    </div>

    <div id="final-screen">
      <div class="result-box">
        <h2>Finished</h2>
        <div id="final-score" class="result-score"></div>
        <div id="final-level" class="level-badge"></div>
      </div>

      <h3 class="review-title">Full Review</h3>
      <div id="review-list"></div>

      <div class="actions">
        <button class="primary-btn" onclick="location.reload()">Restart</button>
      </div>
    </div>
  </div>

  <script>
    var questions = [
      {question:"She __ to school every day.",options:["go","goes","going","gone"],answer:"goes"},
      {question:"I __ coffee yesterday.",options:["drink","drank","drunk","drinking"],answer:"drank"},
      {question:"They __ watching TV now.",options:["is","are","am","be"],answer:"are"},
      {question:"He __ finished his homework.",options:["have","has","had","having"],answer:"has"},
      {question:"We __ to the park tomorrow.",options:["go","went","will go","gone"],answer:"will go"},
      {question:"If I __ more time, I would study more.",options:["have","had","will have","am having"],answer:"had"},
      {question:"She has lived here __ 2019.",options:["for","since","from","at"],answer:"since"},
      {question:"This is the book __ I told you about.",options:["who","where","which","what"],answer:"which"},
      {question:"He is __ than his brother.",options:["tall","taller","more tall","most tall"],answer:"taller"},
      {question:"They were tired, __ they kept working.",options:["but","so","because","or"],answer:"but"},
      {question:"She __ English for five years.",options:["studies","studied","has studied","study"],answer:"has studied"},
      {question:"I didn't see __ at the party.",options:["nobody","anybody","somebody","everybody"],answer:"anybody"},
      {question:"This movie is __ interesting.",options:["very","much","many","more"],answer:"very"},
      {question:"He asked me __ I was from.",options:["where","what","who","how"],answer:"where"},
      {question:"If it rains, we __ at home.",options:["stay","will stay","stayed","staying"],answer:"will stay"}
    ];

    var current = 0;
    var score = 0;
    var selectedAnswer = "";
    var answersReview = [];

    function calculateLevel(scoreValue) {
      if (scoreValue <= 5) return "A1 Beginner";
      if (scoreValue <= 8) return "A2 Elementary";
      if (scoreValue <= 11) return "B1 Intermediate";
      if (scoreValue <= 13) return "B2 Upper Intermediate";
      return "C1 Advanced";
    }

    function startQuiz() {
      var name = document.getElementById("student-name").value;
      var email = document.getElementById("student-email").value;

      if (!name || !email) {
        alert("Enter name and email");
        return;
      }

      document.getElementById("start-screen").style.display = "none";
      document.getElementById("quiz-screen").style.display = "block";

      current = 0;
      score = 0;
      selectedAnswer = "";
      answersReview = [];

      showQuestion();
    }

    function showQuestion() {
      selectedAnswer = "";
      document.getElementById("next-btn").disabled = true;

      var q = questions[current];
      document.getElementById("question-counter").innerText = "Question " + (current + 1) + " of " + questions.length;
      document.getElementById("question").innerText = q.question;

      var percent = Math.round((current / questions.length) * 100);
      document.getElementById("percent-badge").innerText = percent + "%";
      document.getElementById("progress-bar").style.width = percent + "%";

      var optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      q.options.forEach(function(option, index) {
        var btn = document.createElement("button");
        btn.className = "option";
        btn.type = "button";

        var letter = String.fromCharCode(65 + index);

        btn.innerHTML =
          "<div class='option-inner'>" +
            "<div class='option-letter'>" + letter + "</div>" +
            "<div class='option-text'>" + option + "</div>" +
          "</div>";

        btn.onclick = function() {
          document.querySelectorAll(".option").forEach(function(o) {
            o.classList.remove("selected");
          });

          btn.classList.add("selected");
          selectedAnswer = option;
          document.getElementById("next-btn").disabled = false;
        };

        optionsDiv.appendChild(btn);
      });
    }

    function nextQuestion() {
      if (!selectedAnswer) {
        alert("Select an answer");
        return;
      }

      var q = questions[current];
      var correct = (selectedAnswer === q.answer);

      if (correct) score++;

      answersReview.push({
        questionNumber: current + 1,
        question: q.question,
        selected: selectedAnswer,
        correct: q.answer,
        isCorrect: correct
      });

      current++;

      if (current < questions.length) {
        showQuestion();
      } else {
        finishTest();
      }
    }

    function finishTest() {
      document.getElementById("quiz-screen").style.display = "none";
      document.getElementById("final-screen").style.display = "block";

      document.getElementById("final-score").innerText = "Score: " + score + " / " + questions.length;
      document.getElementById("final-level").innerText = "Your level: " + calculateLevel(score);

      var review = document.getElementById("review-list");
      review.innerHTML = "";

      answersReview.forEach(function(item) {
        var card = document.createElement("div");
        card.className = "review-card";

        card.innerHTML =
          "<h4>Question " + item.questionNumber + "</h4>" +
          "<p class='review-question'>" + item.question + "</p>" +
          "<div class='review-line " + (item.isCorrect ? "correct" : "wrong") + "'>Your answer: " + item.selected + "</div>" +
          "<div class='review-line correct-answer'>Correct answer: " + item.correct + "</div>";

        review.appendChild(card);
      });
    }
  </script>
</body>
</html>
