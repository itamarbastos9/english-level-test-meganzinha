<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>English Level Test with Meganzinha</title>

<style>

body{
font-family:Arial;
background:#f6f7fb;
padding:20px;
text-align:center;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#58cc02;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#46a302;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:1px solid #ccc;
}

.option{
display:block;
background:#eee;
padding:12px;
margin:8px;
border-radius:8px;
cursor:pointer;
}

.option:hover{
background:#ddd;
}

#progress-bar{
height:10px;
background:#58cc02;
width:0%;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>English Level Test with Meganzinha</h1>

<div id="start-screen">

<input id="student-name" placeholder="Your name">

<input id="student-email" placeholder="Your email">

<br>

<button onclick="startQuiz()">Start Test</button>

</div>

<div id="quiz-screen" style="display:none">

<h2 id="question"></h2>

<div id="options"></div>

<div id="result"></div>

<div id="progress-bar"></div>

</div>

<div id="final-screen" style="display:none">

<h2 id="final-level"></h2>

<button onclick="location.reload()">Restart</button>

</div>

</div>

<script>

let questions=[]
let current=0
let score=0

let studentName=""
let studentEmail=""

async function startQuiz(){

studentName=document.getElementById("student-name").value
studentEmail=document.getElementById("student-email").value

if(!studentName || !studentEmail){
alert("Enter name and email")
return
}

await loadQuestions()

document.getElementById("start-screen").style.display="none"
document.getElementById("quiz-screen").style.display="block"

showQuestion()

}

async function loadQuestions(){

const res=await fetch("/questions")

questions=await res.json()

}

function showQuestion(){

let q=questions[current]

document.getElementById("question").innerText=q.question

let optionsDiv=document.getElementById("options")

optionsDiv.innerHTML=""

q.options.forEach(option=>{

let btn=document.createElement("div")

btn.className="option"

btn.innerText=option

btn.onclick=()=>checkAnswer(option)

optionsDiv.appendChild(btn)

})

}

async function checkAnswer(answer){

let q=questions[current]

const res=await fetch("/questions/answer",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

id:q.id,

answer:answer

})

})

const data=await res.json()

if(data.correct){

score++

document.getElementById("result").innerText="Correct!"

}else{

document.getElementById("result").innerText="Correct answer: "+data.correctAnswer

}

current++

document.getElementById("progress-bar").style.width=(current/questions.length*100)+"%"

if(current<questions.length){

setTimeout(()=>{

document.getElementById("result").innerText=""

showQuestion()

},800)

}else{

finishTest()

}

}

function calculateLevel(score){

if(score<=4)return"A1 Beginner"
if(score<=8)return"A2 Elementary"
if(score<=12)return"B1 Intermediate"
if(score<=16)return"B2 Upper Intermediate"

return"C1 Advanced"

}

function finishTest(){

let level=calculateLevel(score)

document.getElementById("quiz-screen").style.display="none"

document.getElementById("final-screen").style.display="block"

document.getElementById("final-level").innerText="Your level: "+level

const params=new URLSearchParams({

name:studentName,
email:studentEmail,
score:score,
level:level

})

fetch("https://script.google.com/macros/s/AKfycbz-wqwXuZ61kH9EX_OPZ5RLCXdiBciccB_OqPMhIGW0amlh1LDf1d-70jhK58njN4dG/exec?"+params.toString(),{

method:"GET",
mode:"no-cors"

})

}

</script>

</body>

</html>
