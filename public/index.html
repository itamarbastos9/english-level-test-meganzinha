<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Level Test with Meganzinha</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      padding: 20px;
      text-align: center;
      margin: 0;
    }

    .container {
      max-width: 700px;
      margin: 30px auto 0;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h1 {
      color: #333;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .option {
      display: block;
      width: 100%;
      background: #eee;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      font-size: 16px;
      text-align: left;
    }

    .option:hover {
      background: #ddd;
    }

    .option.selected {
      background: #58cc02;
      color: white;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #58cc02;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .progress-container {
      width: 100%;
      height: 12px;
      background: #e5e5e5;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 20px;
    }

    #progress-bar {
      height: 12px;
      background: #58cc02;
      width: 0%;
    }

    .review-card {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 18px;
      text-align: left;
    }

    .correct {
      color: green;
      font-weight: bold;
    }

    .wrong {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>English Level Test with Meganzinha</h1>

    <div id="start-screen">
      <input id="student-name" placeholder="Your name">
      <input id="student-email" placeholder="Your email">
      <br>
      <button onclick="startQuiz()">Start Test</button>
    </div>

    <div id="quiz-screen" style="display:none">
      <h3 id="question-counter"></h3>
      <h2 id="question"></h2>
      <div id="options"></div>
      <button id="next-btn" onclick="nextQuestion()" disabled>Next</button>

      <div class="progress-container">
        <div id="progress-bar"></div>
      </div>
    </div>

    <div id="final-screen" style="display:none">
      <h2>Your Result</h2>
      <p id="final-score"></p>
      <h3>Review</h3>
      <div id="review-list"></div>
      <button onclick="location.reload()">Restart</button>
    </div>
  </div>

  <script>
    let questions = [
      {
        question: "She __ to school every day.",
        options: ["go", "goes", "going", "gone"],
        answer: "goes"
      },
      {
        question: "I __ coffee yesterday.",
        options: ["drink", "drank", "drunk", "drinking"],
        answer: "drank"
      },
      {
        question: "They __ watching TV now.",
        options: ["is", "are", "am", "be"],
        answer: "are"
      },
      {
        question: "He __ finished his homework.",
        options: ["have", "has", "had", "having"],
        answer: "has"
      },
      {
        question: "We __ to the park tomorrow.",
        options: ["go", "went", "will go", "gone"],
        answer: "will go"
      }
    ];

    let current = 0;
    let score = 0;
    let selectedAnswer = null;
    let answersReview = [];

    function startQuiz() {
      const name = document.getElementById("student-name").value.trim();
      const email = document.getElementById("student-email").value.trim();

      if (!name || !email) {
        alert("Enter name and email");
        return;
      }

      document.getElementById("start-screen").style.display = "none";
      document.getElementById("quiz-screen").style.display = "block";

      showQuestion();
    }

    function showQuestion() {
      selectedAnswer = null;

      const q = questions[current];

      document.getElementById("question-counter").innerText =
        "Question " + (current + 1) + " of " + questions.length;

      document.getElementById("question").innerText = q.question;

      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      q.options.forEach(function(option) {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = option;
        btn.type = "button";

        btn.onclick = function() {
          document.querySelectorAll(".option").forEach(function(b) {
            b.classList.remove("selected");
          });

          btn.classList.add("selected");
          selectedAnswer = option;
          document.getElementById("next-btn").disabled = false;
        };

        optionsDiv.appendChild(btn);
      });

      document.getElementById("next-btn").disabled = true;
    }

    function nextQuestion() {
      if (!selectedAnswer) {
        alert("Select an answer");
        return;
      }

      const q = questions[current];
      const isCorrect = selectedAnswer === q.answer;

      if (isCorrect) {
        score++;
      }

      answersReview.push({
        questionNumber: current + 1,
        question: q.question,
        selected: selectedAnswer,
        correct: q.answer,
        isCorrect: isCorrect
      });

      current++;

      document.getElementById("progress-bar").style.width =
        (current / questions.length * 100) + "%";

      if (current < questions.length) {
        showQuestion();
      } else {
        finishTest();
      }
    }

    function finishTest() {
      document.getElementById("quiz-screen").style.display = "none";
      document.getElementById("final-screen").style.display = "block";

      document.getElementById("final-score").innerText =
        "Score: " + score + " / " + questions.length;

      const review = document.getElementById("review-list");
      review.innerHTML = "";

      answersReview.forEach(function(item) {
        const card = document.createElement("div");
        card.className = "review-card";

        card.innerHTML =
          "<h4>Question " + item.questionNumber + "</h4>" +
          "<p>" + item.question + "</p>" +
          "<p class='" + (item.isCorrect ? "correct" : "wrong") + "'>Your answer: " + item.selected + "</p>" +
          "<p class='correct'>Correct answer: " + item.correct + "</p>";

        review.appendChild(card);
      });
    }
  </script>
</body>
</html>
