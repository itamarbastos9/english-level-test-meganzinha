<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Level Test with Meganzinha</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
      margin: 0;
      padding: 24px;
      color: #1f2937;
    }

    .container {
      max-width: 860px;
      margin: 30px auto;
      background: #ffffff;
      padding: 36px;
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
      border: 1px solid #edf2f7;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 42px;
      line-height: 1.1;
      color: #1f2937;
    }

    .subtitle {
      margin: 0 0 24px;
      color: #6b7280;
      font-size: 17px;
    }

    input {
      width: 100%;
      padding: 15px 16px;
      margin: 10px 0;
      border-radius: 14px;
      border: 1px solid #dbe3ee;
      font-size: 16px;
      background: #f9fbff;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: #58cc02;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(88, 204, 2, 0.12);
    }

    button {
      padding: 14px 22px;
      border: none;
      border-radius: 14px;
      background: #58cc02;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 16px;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(88, 204, 2, 0.20);
    }

    button:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .status {
      margin-top: 6px;
      margin-bottom: 18px;
      font-weight: bold;
      font-size: 15px;
    }

    .ok {
      color: #16a34a;
    }

    #quiz-screen,
    #final-screen {
      display: none;
    }

    .quiz-header {
      text-align: left;
      margin-bottom: 20px;
    }

    #question-counter {
      font-size: 14px;
      font-weight: bold;
      color: #64748b;
      margin-bottom: 12px;
    }

    #question {
      font-size: 30px;
      line-height: 1.3;
      margin: 0 0 22px;
      color: #0f172a;
      text-align: left;
    }

    #options {
      display: grid;
      gap: 14px;
      margin-top: 10px;
    }

    .option {
      display: block;
      width: 100%;
      background: #f8fbff;
      padding: 18px 18px;
      border-radius: 18px;
      cursor: pointer;
      border: 1px solid #dbe7f3;
      font-size: 17px;
      text-align: left;
      color: #1e293b;
      transition: 0.2s ease;
    }

    .option:hover {
      background: #eef7ff;
      border-color: #9ed8ff;
      transform: translateY(-1px);
    }

    .option.selected {
      background: #ecfdf3;
      border: 2px solid #58cc02;
      color: #14532d;
      box-shadow: 0 8px 20px rgba(88, 204, 2, 0.10);
    }

    .bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .progress-wrapper {
      flex: 1;
      min-width: 220px;
    }

    .progress-container {
      width: 100%;
      height: 12px;
      background: #e5edf6;
      border-radius: 999px;
      overflow: hidden;
    }

    #progress-bar {
      height: 12px;
      background: linear-gradient(90deg, #58cc02 0%, #7be52a 100%);
      width: 0%;
      transition: width 0.25s ease;
    }

    .result-summary {
      background: linear-gradient(180deg, #f8fff1 0%, #f3ffe7 100%);
      border: 1px solid #d8f2c1;
      border-radius: 20px;
      padding: 22px;
      margin-top: 24px;
      margin-bottom: 24px;
    }

    .result-summary h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 32px;
      color: #166534;
    }

    .score-line {
      font-size: 22px;
      font-weight: bold;
      color: #1f2937;
      margin: 10px 0;
    }

    .level-line {
      font-size: 18px;
      color: #166534;
      font-weight: bold;
      margin: 6px 0 0;
    }

    .review-title {
      text-align: left;
      font-size: 26px;
      margin-top: 28px;
      margin-bottom: 18px;
      color: #0f172a;
    }

    .review-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 16px;
      text-align: left;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
    }

    .review-card h4 {
      margin: 0 0 10px;
      color: #0f172a;
      font-size: 20px;
    }

    .review-question {
      color: #334155;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .correct {
      color: #15803d;
      font-weight: bold;
      background: #f0fdf4;
      padding: 10px 12px;
      border-radius: 12px;
      margin-top: 8px;
    }

    .wrong {
      color: #b91c1c;
      font-weight: bold;
      background: #fef2f2;
      padding: 10px 12px;
      border-radius: 12px;
      margin-top: 8px;
    }

    .correct-answer {
      color: #166534;
      font-weight: bold;
      background: #f0fdf4;
      padding: 10px 12px;
      border-radius: 12px;
      margin-top: 10px;
    }

    @media (max-width: 700px) {
      body {
        padding: 14px;
      }

      .container {
        padding: 22px;
        border-radius: 18px;
      }

      h1 {
        font-size: 32px;
      }

      #question {
        font-size: 24px;
      }

      .bottom-row {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>English Level Test with Meganzinha</h1>
    <p class="subtitle">Answer the questions and see your English level at the end.</p>

    <p id="js-status" class="status ok">JavaScript loaded</p>

    <div id="start-screen">
      <input id="student-name" type="text" placeholder="Your name">
      <input id="student-email" type="email" placeholder="Your email">
      <button id="start-btn" type="button">Start Test</button>
    </div>

    <div id="quiz-screen">
      <div class="quiz-header">
        <div id="question-counter"></div>
        <h2 id="question"></h2>
      </div>

      <div id="options"></div>

      <div class="bottom-row">
        <div class="progress-wrapper">
          <div class="progress-container">
            <div id="progress-bar"></div>
          </div>
        </div>

        <button id="next-btn" type="button" disabled>Next</button>
      </div>
    </div>

    <div id="final-screen">
      <div class="result-summary">
        <h2>Finished</h2>
        <p class="score-line" id="final-score"></p>
        <p class="level-line" id="final-level"></p>
      </div>

      <h3 class="review-title">Full Review</h3>
      <div id="review-list"></div>

      <button id="restart-btn" type="button">Restart</button>
    </div>
  </div>

  <script>
    var questions = [
      {
        question: "She __ to school every day.",
        options: ["go", "goes", "going", "gone"],
        answer: "goes"
      },
      {
        question: "I __ coffee yesterday.",
        options: ["drink", "drank", "drunk", "drinking"],
        answer: "drank"
      },
      {
        question: "They __ watching TV now.",
        options: ["is", "are", "am", "be"],
        answer: "are"
      },
      {
        question: "He __ finished his homework.",
        options: ["have", "has", "had", "having"],
        answer: "has"
      },
      {
        question: "We __ to the park tomorrow.",
        options: ["go", "went", "will go", "gone"],
        answer: "will go"
      },
      {
        question: "If I __ more time, I would study more.",
        options: ["have", "had", "will have", "am having"],
        answer: "had"
      },
      {
        question: "She has lived here __ 2019.",
        options: ["for", "since", "from", "at"],
        answer: "since"
      },
      {
        question: "This is the book __ I told you about.",
        options: ["who", "where", "which", "what"],
        answer: "which"
      },
      {
        question: "He is __ than his brother.",
        options: ["tall", "taller", "more tall", "most tall"],
        answer: "taller"
      },
      {
        question: "They were tired, __ they kept working.",
        options: ["but", "so", "because", "or"],
        answer: "but"
      }
    ];

    var current = 0;
    var score = 0;
    var selectedAnswer = "";
    var answersReview = [];

    var startScreen = document.getElementById("start-screen");
    var quizScreen = document.getElementById("quiz-screen");
    var finalScreen = document.getElementById("final-screen");

    var nameInput = document.getElementById("student-name");
    var emailInput = document.getElementById("student-email");
    var startBtn = document.getElementById("start-btn");
    var nextBtn = document.getElementById("next-btn");
    var restartBtn = document.getElementById("restart-btn");

    var questionCounter = document.getElementById("question-counter");
    var questionEl = document.getElementById("question");
    var optionsEl = document.getElementById("options");
    var progressBar = document.getElementById("progress-bar");
    var finalScore = document.getElementById("final-score");
    var finalLevel = document.getElementById("final-level");
    var reviewList = document.getElementById("review-list");

    function calculateLevel(scoreValue) {
      if (scoreValue <= 2) return "A1 Beginner";
      if (scoreValue <= 4) return "A2 Elementary";
      if (scoreValue <= 6) return "B1 Intermediate";
      if (scoreValue <= 8) return "B2 Upper Intermediate";
      return "C1 Advanced";
    }

    function showQuestion() {
      selectedAnswer = "";
      nextBtn.disabled = true;

      var q = questions[current];
      questionCounter.textContent = "Question " + (current + 1) + " of " + questions.length;
      questionEl.textContent = q.question;
      optionsEl.innerHTML = "";

      q.options.forEach(function(option) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "option";
        btn.textContent = option;

        btn.onclick = function() {
          var all = document.querySelectorAll(".option");
          all.forEach(function(item) {
            item.classList.remove("selected");
          });

          btn.classList.add("selected");
          selectedAnswer = option;
          nextBtn.disabled = false;
        };

        optionsEl.appendChild(btn);
      });

      progressBar.style.width = ((current / questions.length) * 100) + "%";
    }

    function startQuiz() {
      var name = nameInput.value.trim();
      var email = emailInput.value.trim();

      if (!name || !email) {
        alert("Enter name and email");
        return;
      }

      startScreen.style.display = "none";
      finalScreen.style.display = "none";
      quizScreen.style.display = "block";

      current = 0;
      score = 0;
      selectedAnswer = "";
      answersReview = [];
      progressBar.style.width = "0%";

      showQuestion();
    }

    function nextQuestion() {
      if (!selectedAnswer) {
        alert("Select an answer");
        return;
      }

      var q = questions[current];
      var isCorrect = selectedAnswer === q.answer;

      if (isCorrect) {
        score++;
      }

      answersReview.push({
        questionNumber: current + 1,
        question: q.question,
        selected: selectedAnswer,
        correct: q.answer,
        isCorrect: isCorrect
      });

      current++;

      if (current < questions.length) {
        showQuestion();
      } else {
        finishTest();
      }
    }

    function finishTest() {
      quizScreen.style.display = "none";
      finalScreen.style.display = "block";

      finalScore.textContent = "Score: " + score + " / " + questions.length;
      finalLevel.textContent = "Your level: " + calculateLevel(score);

      reviewList.innerHTML = "";

      answersReview.forEach(function(item) {
        var card = document.createElement("div");
        card.className = "review-card";

        var title = document.createElement("h4");
        title.textContent = "Question " + item.questionNumber;

        var questionText = document.createElement("p");
        questionText.textContent = item.question;
        questionText.className = "review-question";

        var answerText = document.createElement("p");
        answerText.textContent = "Your answer: " + item.selected;
        answerText.className = item.isCorrect ? "correct" : "wrong";

        var correctText = document.createElement("p");
        correctText.textContent = "Correct answer: " + item.correct;
        correctText.className = "correct-answer";

        card.appendChild(title);
        card.appendChild(questionText);
        card.appendChild(answerText);
        card.appendChild(correctText);

        reviewList.appendChild(card);
      });
    }

    startBtn.onclick = startQuiz;
    nextBtn.onclick = nextQuestion;
    restartBtn.onclick = function() {
      location.reload();
    };
  </script>
</body>
</html>
